<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram Website</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <button onclick="showHome()">Home</button>
    <button onclick="showVideos()">Videos</button>
    <button onclick="showProfile()">Profile</button>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <h2>Search Biology Diagrams</h2>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-container">

    <input type="text" id="searchInput" placeholder="Search Diagram..." oninput="searchDiagram()">

    <button onclick="searchDiagram()">Send</button>

  </div>

  <!-- JS FILES (ORDER IMPORTANT) -->
  <script src="navigation.js"></script>
  <script src="diagrams-data.js"></script>
  <script src="search.js"></script>

</body>
</html>
