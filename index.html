<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Diagram Website</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">

    <button onclick="showHome()">
      Home
    </button>

    <button onclick="showVideos()">
      Videos
    </button>

    <button onclick="showProfile()">
      Profile
    </button>

  </div>

  <div class="container">

    <h1>Diagram Search</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Search Diagram..."
    >

    <button onclick="searchDiagram()">
      Search
    </button>

    <div id="results"></div>

  </div>

  <script src="navigation.js"></script>
  <script src="diagrams.js"></script>

</body>
</html>
