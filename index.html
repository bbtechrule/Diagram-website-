<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram Website</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navigation -->
  <div class="navbar">

    <button onclick="showHome()">
      Home
    </button>

    <button onclick="showVideos()">
      Videos
    </button>

    <button onclick="showProfile()">
      Profile
    </button>

  </div>

  <!-- Results Area -->
  <div id="results">

    <h2>Search Biology Diagrams</h2>

  </div>

  <!-- Bottom Search Bar -->
  <div class="search-container">

    <input
      type="text"
      id="searchInput"
      placeholder="Search Diagram..."
    >

    <button onclick="searchDiagram()">
      Send
    </button>

  </div>

  <!-- JavaScript Files -->
  <script src="navigation.js"></script>
  <script src="diagrams.js"></script>

</body>

</html>
