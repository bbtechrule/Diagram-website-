<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>ZeroToOne Diagram Search</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- MENU BUTTON -->
  <div class="menu-btn" onclick="openMenu()">
    ☰
  </div>

  <!-- CHAT AREA -->
  <div id="chat"></div>

  <!-- SEARCH BAR -->
  <div class="search-container">

    <input
      type="text"
      id="searchInput"
      placeholder="Ask zerotoin.com....."
      autocomplete="off">

    <button onclick="sendSearch()">
      Send
    </button>

  </div>

  <!-- JAVASCRIPT FILES -->
  <script src="diagrams-data.js"></script>
  <script src="search.js"></script>
  <script src="navigation.js"></script>

</body>

</html>
